<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%" style="background-color: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif;">
  
  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">How a SQL INNER JOIN Works</text>
  
  <rect x="250" y="70" width="500" height="90" rx="8" fill="#0f172a" />
  <text x="270" y="100" fill="#38bdf8" font-family="monospace" font-size="14" font-weight="bold">SELECT <tspan fill="#f8fafc">Album.Title, Artist.Name</tspan></text>
  <text x="270" y="122" fill="#38bdf8" font-family="monospace" font-size="14" font-weight="bold">FROM <tspan fill="#f8fafc">Album</tspan></text>
  <text x="270" y="144" fill="#34d399" font-family="monospace" font-size="14" font-weight="bold">INNER JOIN <tspan fill="#f8fafc">Artist </tspan><tspan fill="#f472b6">ON</tspan><tspan fill="#f8fafc"> Album.ArtistId = Artist.ArtistId;</tspan></text>

  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="260" height="30" rx="4" fill="#1e3a8a" />
    <text x="130" y="20" fill="#ffffff" text-anchor="middle" font-weight="bold" font-size="14">Album Table</text>
    
    <rect x="0" y="30" width="80" height="25" fill="#dbeafe" stroke="#93c5fd" />
    <rect x="80" y="30" width="120" height="25" fill="#dbeafe" stroke="#93c5fd" />
    <rect x="200" y="30" width="60" height="25" fill="#fbcfe8" stroke="#f472b6" /> <text x="40" y="47" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">AlbumId</text>
    <text x="140" y="47" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">Title</text>
    <text x="230" y="47" font-size="12" font-weight="bold" text-anchor="middle" fill="#9d174d">ArtistId</text>

    <rect x="0" y="55" width="80" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <rect x="80" y="55" width="120" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <rect x="200" y="55" width="60" height="25" fill="#fff1f2" stroke="#f472b6" />
    <text x="40" y="72" font-size="12" text-anchor="middle">1</text>
    <text x="90" y="72" font-size="12">Back in Black</text>
    <text x="230" y="72" font-size="12" text-anchor="middle" font-weight="bold" fill="#b91c1c">1</text>

    <rect x="0" y="80" width="80" height="25" fill="#f8fafc" stroke="#e2e8f0" />
    <rect x="80" y="80" width="120" height="25" fill="#f8fafc" stroke="#e2e8f0" />
    <rect x="200" y="80" width="60" height="25" fill="#fff1f2" stroke="#f472b6" />
    <text x="40" y="97" font-size="12" text-anchor="middle">2</text>
    <text x="90" y="97" font-size="12">Highway to Hell</text>
    <text x="230" y="97" font-size="12" text-anchor="middle" font-weight="bold" fill="#b91c1c">1</text>

    <rect x="0" y="105" width="80" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <rect x="80" y="105" width="120" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <rect x="200" y="105" width="60" height="25" fill="#fff1f2" stroke="#f472b6" />
    <text x="40" y="122" font-size="12" text-anchor="middle">3</text>
    <text x="90" y="122" font-size="12">Thriller</text>
    <text x="230" y="122" font-size="12" text-anchor="middle" font-weight="bold" fill="#b91c1c">2</text>
  </g>

  <g transform="translate(435, 270)">
    <circle cx="0" cy="0" r="25" fill="#34d399" opacity="0.2"/>
    <path d="M-15 -5 L-5 -5 L-5 -15 L5 -15 L5 -5 L15 -5 L15 5 L5 5 L5 15 L-5 15 L-5 5 L-15 5 Z" fill="#059669" transform="rotate(45) scale(0.7)"/>
    <text x="0" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">MATCH ON</text>
    <text x="0" y="55" text-anchor="middle" font-size="11" font-family="monospace" fill="#047857">ArtistId</text>
    
    <path d="M -120 -15 L -40 -5" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)" fill="none" stroke-dasharray="4"/>
    <path d="M 120 -15 L 40 -5" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)" fill="none" stroke-dasharray="4"/>
  </g>

  <g transform="translate(690, 200)">
    <rect x="0" y="0" width="260" height="30" rx="4" fill="#065f46" />
    <text x="130" y="20" fill="#ffffff" text-anchor="middle" font-weight="bold" font-size="14">Artist Table</text>
    
    <rect x="0" y="30" width="70" height="25" fill="#fbcfe8" stroke="#f472b6" /> <rect x="70" y="30" width="190" height="25" fill="#ccfbf1" stroke="#99f6e4" />
    
    <text x="35" y="47" font-size="12" font-weight="bold" text-anchor="middle" fill="#9d174d">ArtistId</text>
    <text x="165" y="47" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">Name</text>

    <rect x="0" y="55" width="70" height="25" fill="#fff1f2" stroke="#f472b6" />
    <rect x="70" y="55" width="190" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <text x="35" y="72" font-size="12" text-anchor="middle" font-weight="bold" fill="#b91c1c">1</text>
    <text x="80" y="72" font-size="12">AC/DC</text>

    <rect x="0" y="80" width="70" height="25" fill="#fff1f2" stroke="#f472b6" />
    <rect x="70" y="80" width="190" height="25" fill="#f8fafc" stroke="#e2e8f0" />
    <text x="35" y="97" font-size="12" text-anchor="middle" font-weight="bold" fill="#b91c1c">2</text>
    <text x="80" y="97" font-size="12">Michael Jackson</text>

    <rect x="0" y="105" width="70" height="25" fill="#fff1f2" stroke="#f472b6" />
    <rect x="70" y="105" width="190" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <text x="35" y="122" font-size="12" text-anchor="middle" font-weight="bold" fill="#b91c1c">3</text>
    <text x="80" y="122" font-size="12">Led Zeppelin</text>
  </g>

  <path d="M 500 360 L 500 400" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#main-arrow)"/>

  <g transform="translate(320, 420)">
    <rect x="0" y="0" width="360" height="30" rx="4" fill="#0f172a" />
    <text x="180" y="20" fill="#ffffff" text-anchor="middle" font-weight="bold" font-size="14">Query Result (Combined Data)</text>
    
    <rect x="0" y="30" width="180" height="25" fill="#e2e8f0" stroke="#cbd5e1" />
    <rect x="180" y="30" width="180" height="25" fill="#e2e8f0" stroke="#cbd5e1" />
    <text x="90" y="47" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">Title (from Album)</text>
    <text x="270" y="47" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">Name (from Artist)</text>

    <rect x="0" y="55" width="180" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <rect x="180" y="55" width="180" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <text x="15" y="72" font-size="12">Back in Black</text>
    <text x="195" y="72" font-size="12" fill="#059669" font-weight="bold">AC/DC</text>

    <rect x="0" y="80" width="180" height="25" fill="#f8fafc" stroke="#e2e8f0" />
    <rect x="180" y="80" width="180" height="25" fill="#f8fafc" stroke="#e2e8f0" />
    <text x="15" y="97" font-size="12">Highway to Hell</text>
    <text x="195" y="97" font-size="12" fill="#059669" font-weight="bold">AC/DC</text>

    <rect x="0" y="105" width="180" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <rect x="180" y="105" width="180" height="25" fill="#ffffff" stroke="#e2e8f0" />
    <text x="15" y="122" font-size="12">Thriller</text>
    <text x="195" y="122" font-size="12" fill="#059669" font-weight="bold">Michael Jackson</text>
  </g>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399" />
    </marker>
    <marker id="main-arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
